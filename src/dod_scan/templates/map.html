<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>DOD Contract Map</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/d3-delaunay@6'></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100vh;
        }
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            overflow-y: auto;
            z-index: 100;
            padding: 20px;
        }
        #sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        .filter-section {
            margin-bottom: 24px;
        }
        .filter-section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .filter-section input,
        .filter-section select {
            width: 100%;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        .filter-section input:focus,
        .filter-section select:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
        }
        .range-group {
            display: flex;
            gap: 8px;
        }
        .range-group input {
            flex: 1;
        }
        .range-group span {
            padding: 8px;
            color: #999;
        }
        .checkbox-group {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px;
        }
        .checkbox-item {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        .checkbox-item input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            width: auto;
            border: none;
        }
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            text-transform: none;
            font-weight: normal;
            color: #333;
            letter-spacing: normal;
            font-size: 13px;
        }
        .stats {
            background: #f5f5f5;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.6;
        }
        .stats div {
            color: #666;
        }
        .stat-value {
            color: #333;
            font-weight: 600;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #357abd;
        }
        button:active {
            background: #2a5099;
        }
        .layer-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .layer-toggle button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            background: #e8e8e8;
            color: #555;
        }
        .layer-toggle button.active {
            background: #4a90e2;
            color: white;
        }
        .layer-toggle button:hover {
            background: #357abd;
            color: white;
        }
        #legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            background: white;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
            padding: 12px 16px;
            z-index: 100;
            font-size: 12px;
        }
        #legend h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: #333;
        }
        .legend-bar {
            width: 160px;
            height: 12px;
            border-radius: 3px;
            background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
            margin-bottom: 4px;
        }
        .legend-labels {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 10px;
        }
    </style>
</head>
<body>
<div id='map'></div>
<div id='legend'>
    <h4>Contract Value</h4>
    <div class='legend-bar'></div>
    <div class='legend-labels'>
        <span>$1M</span>
        <span>$50M</span>
        <span>$10B+</span>
    </div>
</div>
<div id='sidebar'>
    <h2>Filter Contracts</h2>

    <div class='stats'>
        <div>Contracts: <span class='stat-value' id='totalContracts'>{{ total_contracts }}</span></div>
        <div>Total Value: <span class='stat-value' id='totalValue'>$0</span></div>
        <div>Showing: <span class='stat-value' id='filteredCount'>{{ total_contracts }}</span></div>
    </div>

    <div class='filter-section'>
        <label>Layers</label>
        <div class='layer-toggle'>
            <button id='toggleHeatmap'>Heatmap</button>
            <button id='toggleVoronoi'>Voronoi</button>
        </div>
    </div>

    <div class='filter-section'>
        <label for='minDate'>Published From</label>
        <input type='date' id='minDate' />
    </div>

    <div class='filter-section'>
        <label for='maxDate'>Published To</label>
        <input type='date' id='maxDate' />
    </div>

    <div class='filter-section'>
        <label>Branch</label>
        <div class='checkbox-group' id='branchGroup'>
            {% for branch in branches %}
            <div class='checkbox-item'>
                <input type='checkbox' id='branch-{{ loop.index0 }}' value='{{ branch }}' class='branch-checkbox' checked />
                <label for='branch-{{ loop.index0 }}'>{{ branch }}</label>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class='filter-section'>
        <label>Dollar Amount</label>
        <div class='range-group'>
            <input type='number' id='minDollar' placeholder='Min' />
            <span>to</span>
            <input type='number' id='maxDollar' placeholder='Max' />
        </div>
    </div>

    <button id='resetBtn'>Reset Filters</button>
</div>

<script>
mapboxgl.accessToken = '{{ mapbox_token }}';
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-95.7129, 37.0902],
    zoom: 3.5,
    pitch: 0,
    bearing: 0
});

const geojsonData = {{ geojson_data | safe }};
const allFeatures = geojsonData.features || [];

let heatmapVisible = false;
let voronoiVisible = false;

function dollarToColor(amount) {
    const minVal = 1e6, maxVal = 1e10;
    let t;
    if (amount <= minVal) t = 0;
    else if (amount >= maxVal) t = 1;
    else t = (Math.log10(amount) - Math.log10(minVal)) / (Math.log10(maxVal) - Math.log10(minVal));

    let r, g;
    if (t < 0.5) {
        r = Math.round(255 * (t * 2));
        g = 255;
    } else {
        r = 255;
        g = Math.round(255 * (1 - (t - 0.5) * 2));
    }
    return `rgba(${r}, ${g}, 0, 0.35)`;
}

function getFilteredFeatures() {
    const minDate = document.getElementById('minDate').value;
    const maxDate = document.getElementById('maxDate').value;
    const minDollar = parseFloat(document.getElementById('minDollar').value) || 0;
    const maxDollar = parseFloat(document.getElementById('maxDollar').value) || Infinity;
    const selectedBranches = new Set(
        Array.from(document.querySelectorAll('.branch-checkbox:checked')).map(cb => cb.value)
    );

    return allFeatures.filter(f => {
        const p = f.properties;
        if (selectedBranches.size === 0) return false;
        if (!selectedBranches.has(p.branch)) return false;
        if (minDate && p.publish_date < minDate) return false;
        if (maxDate && p.publish_date > maxDate) return false;
        if ((p.dollar_amount || 0) < minDollar) return false;
        if ((p.dollar_amount || 0) > maxDollar) return false;
        return true;
    });
}

function buildVoronoiGeoJSON(features) {
    if (features.length < 2) {
        return { type: 'FeatureCollection', features: [] };
    }

    const bounds = map.getBounds();
    const pad = 5;
    const xMin = bounds.getWest() - pad;
    const xMax = bounds.getEast() + pad;
    const yMin = bounds.getSouth() - pad;
    const yMax = bounds.getNorth() + pad;

    const points = features.map(f => f.geometry.coordinates);
    const delaunay = d3.Delaunay.from(points);
    const voronoi = delaunay.voronoi([xMin, yMin, xMax, yMax]);

    const voronoiFeatures = [];
    for (let i = 0; i < features.length; i++) {
        const cell = voronoi.cellPolygon(i);
        if (!cell) continue;

        voronoiFeatures.push({
            type: 'Feature',
            geometry: {
                type: 'Polygon',
                coordinates: [cell]
            },
            properties: {
                dollar_amount: features[i].properties.dollar_amount || 0,
                color: dollarToColor(features[i].properties.dollar_amount || 0)
            }
        });
    }

    return { type: 'FeatureCollection', features: voronoiFeatures };
}

function updateVoronoi() {
    if (!voronoiVisible) return;
    if (!map.getSource('voronoi')) return;

    const filtered = getFilteredFeatures();
    const voronoiData = buildVoronoiGeoJSON(filtered);
    map.getSource('voronoi').setData(voronoiData);
}

map.on('load', function() {
    // Contracts circle source + layer
    map.addSource('contracts', {
        type: 'geojson',
        data: geojsonData
    });

    map.addLayer({
        id: 'contracts-circles',
        type: 'circle',
        source: 'contracts',
        paint: {
            'circle-radius': [
                'interpolate',
                ['linear'],
                ['zoom'],
                3, 4,
                8, 8,
                12, 12
            ],
            'circle-color': [
                'interpolate',
                ['linear'],
                ['get', 'dollar_amount'],
                1e6, '#00ff00',
                5e7, '#ffff00',
                1e10, '#ff0000'
            ],
            'circle-opacity': 0.75,
            'circle-stroke-width': 1,
            'circle-stroke-color': '#fff'
        }
    });

    // Heatmap layer (hidden by default)
    map.addLayer({
        id: 'contracts-heatmap',
        type: 'heatmap',
        source: 'contracts',
        layout: { visibility: 'none' },
        paint: {
            'heatmap-weight': [
                'interpolate',
                ['linear'],
                ['get', 'dollar_amount'],
                0, 0,
                1e6, 0.1,
                5e7, 0.5,
                1e10, 1
            ],
            'heatmap-intensity': [
                'interpolate',
                ['linear'],
                ['zoom'],
                0, 1,
                9, 3
            ],
            'heatmap-color': [
                'interpolate',
                ['linear'],
                ['heatmap-density'],
                0, 'rgba(0,0,0,0)',
                0.1, 'rgba(0,255,0,0.3)',
                0.3, 'rgba(128,255,0,0.5)',
                0.5, 'rgba(255,255,0,0.6)',
                0.7, 'rgba(255,128,0,0.7)',
                1, 'rgba(255,0,0,0.8)'
            ],
            'heatmap-radius': [
                'interpolate',
                ['linear'],
                ['zoom'],
                0, 20,
                6, 40,
                9, 60
            ],
            'heatmap-opacity': 0.7
        }
    }, 'contracts-circles');

    // Voronoi source + layer (hidden by default)
    map.addSource('voronoi', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] }
    });

    map.addLayer({
        id: 'voronoi-fill',
        type: 'fill',
        source: 'voronoi',
        layout: { visibility: 'none' },
        paint: {
            'fill-color': ['get', 'color'],
            'fill-opacity': 1
        }
    }, 'contracts-circles');

    map.addLayer({
        id: 'voronoi-line',
        type: 'line',
        source: 'voronoi',
        layout: { visibility: 'none' },
        paint: {
            'line-color': 'rgba(255, 255, 255, 0.4)',
            'line-width': 0.5
        }
    }, 'contracts-circles');

    // Click handler for popup
    map.on('click', 'contracts-circles', function(e) {
        const feature = e.features[0];
        const props = feature.properties;
        const sourceLink = props.source_url
            ? `<a href="${escapeHtml(props.source_url)}" target="_blank" rel="noopener" style="color: #4a90e2;">View full announcement</a>`
            : '';
        const popup = new mapboxgl.Popup({ maxWidth: '360px' })
            .setLngLat(e.lngLat)
            .setHTML(`
                <div style='font-size: 12px;'>
                    <strong>${escapeHtml(props.company_name)}</strong><br/>
                    <strong>Amount:</strong> ${props.dollar_display}<br/>
                    <strong>Contract:</strong> ${escapeHtml(props.contract_number)}<br/>
                    <strong>Branch:</strong> ${escapeHtml(props.branch)}<br/>
                    <strong>Completion:</strong> ${escapeHtml(props.completion_date)}<br/>
                    <strong>Published:</strong> ${escapeHtml(props.publish_date)}<br/>
                    <hr style='margin: 8px 0;' />
                    <div style='max-height: 150px; overflow-y: auto;'>
                        <small>${escapeHtml(props.description || '')}</small>
                    </div>
                    ${sourceLink ? `<hr style='margin: 8px 0;' />${sourceLink}` : ''}
                </div>
            `)
            .addTo(map);
    });

    // Change cursor on hover
    map.on('mouseenter', 'contracts-circles', function() {
        map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'contracts-circles', function() {
        map.getCanvas().style.cursor = '';
    });

    // Recompute voronoi on zoom/move
    map.on('moveend', updateVoronoi);
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function applyFilters() {
    const minDate = document.getElementById('minDate').value;
    const maxDate = document.getElementById('maxDate').value;
    const minDollar = parseFloat(document.getElementById('minDollar').value) || 0;
    const maxDollar = parseFloat(document.getElementById('maxDollar').value) || Infinity;

    const selectedBranches = Array.from(document.querySelectorAll('.branch-checkbox:checked'))
        .map(cb => cb.value);

    const filters = ['all'];

    if (minDate) {
        filters.push(['>=', ['get', 'publish_date'], minDate]);
    }
    if (maxDate) {
        filters.push(['<=', ['get', 'publish_date'], maxDate]);
    }
    if (selectedBranches.length > 0) {
        filters.push(['in', ['get', 'branch'], ['literal', selectedBranches]]);
    } else {
        filters.push(false);
    }
    if (minDollar > 0) {
        filters.push(['>=', ['get', 'dollar_amount'], minDollar]);
    }
    if (maxDollar < Infinity) {
        filters.push(['<=', ['get', 'dollar_amount'], maxDollar]);
    }

    if (map.getSource('contracts')) {
        map.setFilter('contracts-circles', filters);
        map.setFilter('contracts-heatmap', filters);
    }

    updateVoronoi();
    updateStats();
}

function updateStats() {
    const filtered = getFilteredFeatures();
    const totalValue = filtered.reduce((sum, f) => sum + (f.properties.dollar_amount || 0), 0);
    document.getElementById('filteredCount').textContent = filtered.length.toLocaleString();
    document.getElementById('totalValue').textContent = `$${(totalValue / 1e6).toFixed(1)}M`;
}

// Layer toggle handlers
document.getElementById('toggleHeatmap').addEventListener('click', function() {
    heatmapVisible = !heatmapVisible;
    this.classList.toggle('active', heatmapVisible);
    map.setLayoutProperty('contracts-heatmap', 'visibility', heatmapVisible ? 'visible' : 'none');
});

document.getElementById('toggleVoronoi').addEventListener('click', function() {
    voronoiVisible = !voronoiVisible;
    this.classList.toggle('active', voronoiVisible);
    const vis = voronoiVisible ? 'visible' : 'none';
    map.setLayoutProperty('voronoi-fill', 'visibility', vis);
    map.setLayoutProperty('voronoi-line', 'visibility', vis);
    if (voronoiVisible) updateVoronoi();
});

// Event listeners
document.getElementById('minDate').addEventListener('change', applyFilters);
document.getElementById('maxDate').addEventListener('change', applyFilters);
document.getElementById('minDollar').addEventListener('input', applyFilters);
document.getElementById('maxDollar').addEventListener('input', applyFilters);
document.querySelectorAll('.branch-checkbox').forEach(cb => {
    cb.addEventListener('change', applyFilters);
});

document.getElementById('resetBtn').addEventListener('click', function() {
    document.getElementById('minDate').value = '';
    document.getElementById('maxDate').value = '';
    document.getElementById('minDollar').value = '';
    document.getElementById('maxDollar').value = '';
    document.querySelectorAll('.branch-checkbox').forEach(cb => cb.checked = true);
    applyFilters();
});

// Initial stats
const initTotal = allFeatures.reduce((sum, f) => sum + (f.properties.dollar_amount || 0), 0);
document.getElementById('totalValue').textContent = `$${(initTotal / 1e6).toFixed(1)}M`;
document.getElementById('filteredCount').textContent = allFeatures.length.toLocaleString();
</script>
</body>
</html>
